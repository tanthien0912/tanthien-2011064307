<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý sản phẩm</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<h2>Quản lý sản phẩm</h2>

<input type="text" id="search" class="form-control mb-3" placeholder="Tìm theo tên..." oninput="handleSearch()">

<div class="mb-3">
    <button class="btn btn-primary" onclick="sortName(true)">Tên A-Z</button>
    <button class="btn btn-primary" onclick="sortName(false)">Tên Z-A</button>
    <button class="btn btn-success" onclick="sortPrice(true)">Giá tăng</button>
    <button class="btn btn-success" onclick="sortPrice(false)">Giá giảm</button>
</div>

<table class="table table-bordered">
<thead>
<tr>
<th>ID</th>
<th>Tên</th>
<th>Giá</th>
<th>Danh mục</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
